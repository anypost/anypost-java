name: Release

# Publishes to Maven Central by pushing a semver tag (e.g. v0.1.0). Bump the
# version in pom.xml AND Version.java, tag the commit, and push. This workflow
# gates the tag on a green test run, then signs and deploys via the Central
# Publishing plugin (mvn -Prelease deploy).
#
# Required repository secrets:
#   MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD  (Central Portal token)
#   GPG_PRIVATE_KEY / GPG_PASSPHRASE                 (artifact signing)

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Test
        run: mvn -B verify
      - name: Publish to Maven Central
        run: mvn -B -Prelease deploy -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
